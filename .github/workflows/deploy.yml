name: Deploy

# Deploys to Cloud Run on every push to main (after CI passes), or manually.
# Configure the repo Variables and Secrets listed in docs/GCP_SETUP.md.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    # Only run if CI succeeded (or when triggered manually).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for Workload Identity Federation
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ vars.SERVICE_NAME }}" \
            --source . \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --region "${{ vars.GCP_REGION }}" \
            --allow-unauthenticated \
            --port 8080 \
            --min-instances 0 \
            --max-instances 2 \
            --set-env-vars "WORKOUT_STORE=firestore,GOOGLE_CLOUD_PROJECT=${{ vars.GCP_PROJECT_ID }},COOKIE_SECURE=true,ALLOWED_EMAIL=${{ vars.ALLOWED_EMAIL }},OAUTH_REDIRECT_URL=${{ vars.OAUTH_REDIRECT_URL }},GOOGLE_CLIENT_ID=${{ vars.GOOGLE_CLIENT_ID }}" \
            --set-secrets "GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,SESSION_SECRET=SESSION_SECRET:latest"
